<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- LINEプレビュー（OGP）修正 -->
    <title>ふたりの暮らし家計簿</title>
    <meta property="og:title" content="ふたりの暮らし家計簿">
    <meta property="og:description" content="2026年からの家計管理。AI解析でノートの内容を自動入力できる、ふたりのためのスマート家計簿。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://fonts.gstatic.com/s/i/materialiconsoutlined/auto_fix_high/v14/24px.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #fffafb;
            color: #5d5555;
            -webkit-tap-highlight-color: transparent;
        }
        .kawaii-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(255, 192, 203, 0.15);
            border: 1px solid #fff0f3;
        }
        .input-box {
            background: #fffafa;
            border: 2px solid #ffe4e9;
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-box:focus {
            outline: none;
            border-color: #ffb6c1;
            background: white;
        }
        .btn-main {
            background: linear-gradient(135deg, #ff99aa 0%, #ff8095 100%);
            color: white;
            font-weight: bold;
            border-radius: 16px;
            padding: 16px;
            transition: transform 0.2s;
            box-shadow: 0 4px 12px rgba(255, 128, 149, 0.3);
        }
        .btn-ai {
            background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
            color: white;
            font-weight: bold;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);
        }
        .section-header {
            color: #ff758c;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        /* OCRアニメーション */
        .scanning {
            position: relative;
            overflow: hidden;
        }
        .scanning::after {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(167, 139, 250, 0.4), transparent);
            animation: scan 2s infinite linear;
        }
        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="pb-20">

    <div id="loader">
        <div id="loader-icon" class="text-5xl animate-bounce mb-4">🌸</div>
        <p id="loader-text" class="text-pink-400 font-bold">通信中...</p>
        <div id="ocr-progress" class="hidden w-48 h-2 bg-gray-100 rounded-full mt-4 overflow-hidden">
            <div class="h-full bg-purple-500 animate-[shimmer_2s_infinite]"></div>
        </div>
    </div>

    <header class="p-8 text-center">
        <div class="inline-block px-4 py-1 border-2 border-pink-200 rounded-full text-[10px] text-pink-300 mb-2 font-bold tracking-widest uppercase">Love & AI Traceability</div>
        <h1 class="text-2xl font-bold text-pink-400">ふたりの暮らし家計簿</h1>
    </header>

    <main class="px-5 max-w-md mx-auto space-y-6">
        
        <!-- Menu -->
        <div id="nav-menu" class="grid grid-cols-2 gap-4">
            <button onclick="showPage('input')" class="kawaii-card p-6 flex flex-col items-center">
                <span class="text-4xl mb-2">✏️</span>
                <span class="text-sm font-bold">ノートをつける</span>
            </button>
            <button onclick="loadHistory()" class="kawaii-card p-6 flex flex-col items-center">
                <span class="text-4xl mb-2">📒</span>
                <span class="text-sm font-bold">過去のノート</span>
            </button>
        </div>

        <!-- Input Page -->
        <div id="page-input" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="showPage('menu')" class="text-pink-300 font-bold text-sm">← 戻る</button>
                <!-- AI OCR Button -->
                <button onclick="document.getElementById('ocr-input').click()" class="btn-ai text-xs flex items-center gap-2">
                    <span>✨ AIでノートを読み取る</span>
                </button>
                <input type="file" id="ocr-input" accept="image/*" capture="environment" class="hidden" onchange="handleOCR(this)">
            </div>

            <form id="main-form" class="kawaii-card p-6 space-y-8">
                <!-- 基本 -->
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[10px] text-gray-400 ml-1">Year</label>
                        <input type="number" name="year" id="in-year" class="input-box bg-gray-50" readonly>
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] text-gray-400 ml-1">Month</label>
                        <select name="month" id="in-month" class="input-box"></select>
                    </div>
                </div>

                <!-- 収入 -->
                <div>
                    <div class="section-header">収入</div>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center"><span class="text-xs">前月くりこし</span><input type="number" name="prevCarry" class="input-box w-2/3 calc" value="0" inputmode="numeric"></div>
                        <div class="flex justify-between items-center"><span class="text-xs">給料(芯)</span><input type="number" name="incomeS" class="input-box w-2/3 calc" value="0" inputmode="numeric"></div>
                        <div class="flex justify-between items-center"><span class="text-xs">給料(愛)</span><input type="number" name="incomeA" class="input-box w-2/3 calc" value="0" inputmode="numeric"></div>
                        <div class="flex justify-between items-center"><span class="text-xs">売電/他</span><input type="number" name="incomeSolar" class="input-box w-2/3 calc" value="0" inputmode="numeric"></div>
                    </div>
                </div>

                <!-- 固定支出 -->
                <div>
                    <div class="section-header">固定支出</div>
                    <div class="grid grid-cols-2 gap-3">
                        <label><span class="text-[10px] ml-1">保険1</span><input type="number" name="fixIns1" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">保険2</span><input type="number" name="fixIns2" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">万ピコム</span><input type="number" name="fixComm" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">投資</span><input type="number" name="fixInvest" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">医療</span><input type="number" name="fixMed" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">光熱予算</span><input type="number" name="fixUtil" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1 text-blue-400">水(実)</span><input type="number" name="utilWater" class="input-box" value="0"></label>
                        <label><span class="text-[10px] ml-1 text-blue-400">電(実)</span><input type="number" name="utilElec" class="input-box" value="0"></label>
                    </div>
                </div>

                <!-- 生活費 -->
                <div>
                    <div class="section-header">生活費</div>
                    <div class="bg-pink-50/30 p-4 rounded-2xl border-2 border-dashed border-pink-100 mb-4">
                        <div class="grid grid-cols-3 gap-2">
                            <label><span class="text-[9px]">1W</span><input type="number" name="day1W" class="input-box text-center p-1 calc" value="0"></label>
                            <label><span class="text-[9px]">2W</span><input type="number" name="day2W" class="input-box text-center p-1 calc" value="0"></label>
                            <label><span class="text-[9px]">3W</span><input type="number" name="day3W" class="input-box text-center p-1 calc" value="0"></label>
                            <label><span class="text-[9px]">4W</span><input type="number" name="day4W" class="input-box text-center p-1 calc" value="0"></label>
                            <label class="col-span-2"><span class="text-[9px]">予備</span><input type="number" name="dayReserve" class="input-box text-center p-1 calc" value="0"></label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <label><span class="text-[10px] ml-1">交通</span><input type="number" name="dayTrans" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">特別</span><input type="number" name="daySpecial" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">携帯/通信</span><input type="number" name="dayComm" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">貯金</span><input type="number" name="savings" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">おこづかいS</span><input type="number" name="dayPocketS" class="input-box calc" value="0"></label>
                        <label><span class="text-[10px] ml-1">おこづかいA</span><input type="number" name="dayPocketA" class="input-box calc" value="0"></label>
                    </div>
                </div>

                <!-- 集計 -->
                <div class="grid grid-cols-3 gap-2 pt-4 border-t-2 border-pink-100 text-center font-bold">
                    <div class="bg-gray-100 p-2 rounded-xl"><p class="text-[8px] text-gray-400 uppercase">Income</p><p id="res-income" class="text-xs">0</p></div>
                    <div class="bg-pink-50 p-2 rounded-xl text-pink-400"><p class="text-[8px] uppercase">Expense</p><p id="res-expense" class="text-xs">0</p></div>
                    <div class="bg-pink-500 p-2 rounded-xl text-white shadow-lg shadow-pink-100"><p class="text-[8px] uppercase">Carry</p><p id="res-carry" class="text-xs">0</p></div>
                </div>

                <button type="button" onclick="sendData()" class="btn-main w-full">スプレッドシートに保存</button>
            </form>
        </div>

        <!-- History -->
        <div id="page-history" class="hidden space-y-4">
            <button onclick="showPage('menu')" class="mb-4 text-pink-300 font-bold text-sm">← 戻る</button>
            <div id="history-list" class="space-y-4"></div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxZOmmvIXGoQQukVVxs5Ll3vdmt2H3Rs5SWNIbdNwZOH0naVHH6S0XWTtKQGAQ8of7A4Q/exec";
        const apiKey = ""; // 実行環境から提供されます

        window.onload = () => {
            const now = new Date();
            document.getElementById('in-year').value = now.getFullYear();
            const monthSelect = document.getElementById('in-month');
            for(let i=1; i<=12; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i + "月";
                if(i === now.getMonth() + 1) opt.selected = true;
                monthSelect.appendChild(opt);
            }
            document.querySelectorAll('.calc').forEach(el => el.addEventListener('input', calculate));
        };

        function showPage(p) {
            document.getElementById('nav-menu').classList.toggle('hidden', p !== 'menu');
            document.getElementById('page-input').classList.toggle('hidden', p !== 'input');
            document.getElementById('page-history').classList.toggle('hidden', p !== 'history');
        }

        // --- AI OCR Logic (Gemini 2.5 Flash) ---
        async function handleOCR(input) {
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const reader = new FileReader();
            
            setLoader(true, "AIがノートを解析中...", "✨", true);

            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                const prompt = `
                画像は日本の夫婦の家計簿予算ノートです。以下の項目を抽出し、JSON形式で返してください。
                数値が見当たらない場合は0としてください。
                
                {
                    "year": 数値(例:2026), "month": 数値(例:1),
                    "prevCarry": 前月くりこし金額,
                    "incomeS": S(芯)の給料, "incomeA": A(愛)の給料,
                    "incomeSolar": 売電収入, "incomeOther": その他収入,
                    "fixIns1": 保険1, "fixIns2": 保険2,
                    "fixComm": 万ピコム/通信費, "fixInvest": 投資,
                    "fixMed": 医療, "fixUtil": 光熱費予算,
                    "utilWater": 水道実績, "utilElec": 電気実績,
                    "day1W": 1週目予算, "day2W": 2週目予算, "day3W": 3週目予算, "day4W": 4週目予算,
                    "dayReserve": 予備費, "dayTrans": 交通費,
                    "daySpecial": 特別費, "dayComm": 携帯通信,
                    "dayPocketS": おこづかいS, "dayPocketA": おこづかいA,
                    "savings": 貯金
                }`;

                try {
                    const result = await callGemini(prompt, base64);
                    const data = JSON.parse(result);
                    applyOCRData(data);
                    setLoader(false);
                } catch (err) {
                    console.error(err);
                    alert("AI解析に失敗しました。手動で入力してください。");
                    setLoader(false);
                }
            };
            reader.readAsDataURL(file);
        }

        async function callGemini(prompt, base64) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: "image/png", data: base64 } }
                    ]
                }],
                generationConfig: { responseMimeType: "application/json" }
            };

            let retryCount = 0;
            const maxRetries = 5;
            
            while (retryCount <= maxRetries) {
                try {
                    const resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    const json = await resp.json();
                    return json.candidates[0].content.parts[0].text;
                } catch (e) {
                    if (retryCount === maxRetries) throw e;
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                    retryCount++;
                }
            }
        }

        function applyOCRData(data) {
            if (!data) return;
            const form = document.getElementById('main-form');
            for (let key in data) {
                const input = form.querySelector(`[name="${key}"]`);
                if (input) {
                    input.value = data[key];
                    if (key === 'month') input.dispatchEvent(new Event('change'));
                }
            }
            calculate();
        }

        function setLoader(show, text = "通信中...", icon = "🌸", isOcr = false) {
            const l = document.getElementById('loader');
            document.getElementById('loader-text').textContent = text;
            document.getElementById('loader-icon').textContent = icon;
            document.getElementById('ocr-progress').classList.toggle('hidden', !isOcr);
            l.style.display = show ? 'flex' : 'none';
        }

        // --- Standard Logic ---
        function calculate() {
            const fd = new FormData(document.getElementById('main-form'));
            const v = (n) => parseFloat(fd.get(n)) || 0;
            const income = v('prevCarry') + v('incomeS') + v('incomeA') + v('incomeSolar');
            const living = v('day1W') + v('day2W') + v('day3W') + v('day4W') + v('dayReserve');
            const fixed = v('fixIns1') + v('fixIns2') + v('fixComm') + v('fixInvest') + v('fixMed') + v('fixUtil');
            const others = v('dayTrans') + v('daySpecial') + v('dayComm') + v('dayPocketS') + v('dayPocketA') + v('savings');
            const expense = living + fixed + others;
            document.getElementById('res-income').textContent = income.toLocaleString();
            document.getElementById('res-expense').textContent = expense.toLocaleString();
            document.getElementById('res-carry').textContent = (income - expense).toLocaleString();
            return { income, expense, carry: income - expense };
        }

        async function sendData() {
            const res = calculate();
            const fd = new FormData(document.getElementById('main-form'));
            const data = { timestamp: new Date().toLocaleString("ja-JP"), resIncome: res.income, resExpense: res.expense, resCarry: res.carry };
            for(let [k,v] of fd.entries()) data[k] = isNaN(v) ? v : parseFloat(v);
            
            setLoader(true, "保存中...");
            try {
                const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await resp.json();
                if(result.status === 'success') {
                    alert("スプレッドシートへ保存しました！");
                    showPage('menu');
                }
            } catch(e) { alert("保存に失敗しました。"); }
            finally { setLoader(false); }
        }

        async function loadHistory() {
            setLoader(true, "履歴を取得中...");
            try {
                const r = await fetch(GAS_URL);
                const res = await r.json();
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                res.data.reverse().forEach(row => {
                    const card = document.createElement('div');
                    card.className = "kawaii-card p-5 space-y-3";
                    card.innerHTML = `
                        <div class="flex justify-between items-center border-b pb-2 border-pink-50">
                            <span class="font-bold text-pink-400">${row.year}年 ${row.month}月</span>
                            <span class="text-[8px] text-gray-300 tracking-tighter">${row.timestamp}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center text-[10px] text-gray-500">
                            <div class="bg-gray-50 p-2 rounded-xl">収入<br>¥${(row.resIncome||0).toLocaleString()}</div>
                            <div class="bg-pink-50 p-2 rounded-xl">支出<br>¥${(row.resExpense||0).toLocaleString()}</div>
                            <div class="bg-pink-500 text-white p-2 rounded-xl font-bold">繰越<br>¥${(row.resCarry||0).toLocaleString()}</div>
                        </div>`;
                    list.appendChild(card);
                });
                showPage('history');
            } catch(e) { alert("取得失敗"); }
            finally { setLoader(false); }
        }
    </script>
</body>
</html>
