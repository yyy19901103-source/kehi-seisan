<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ふたりの暮らし家計簿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --文字色: #5a524d;
            --メイン色: #87ceeb;
            --アクセント: #f9e2af;
        }

        body {
            font-family: 'Kiwi Maru', serif;
            color: var(--文字色);
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            background-color: #fff9f0;
        }

        /* 絶景！オーロラ流体背景 */
        #背景キャンバス {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.8;
            pointer-events: none;
        }

        /* 超高級グラスモルフィズム */
        .ガラスのカード {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(255,255,255,0.5);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .ガラスのカード:active {
            transform: scale(0.98);
        }

        /* ふわぷる入力欄 */
        .入力らん {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            font-size: 18px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .入力らん:focus {
            outline: none;
            border-color: var(--メイン色);
            background: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.25);
        }

        /* ぽよんボタン */
        .メインボタン {
            background: linear-gradient(135deg, #87ceeb, #ffb7c5);
            color: white;
            font-weight: bold;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(255, 183, 197, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
        }
        .メインボタン:active {
            transform: scale(0.92) rotate(-2deg);
            box-shadow: 0 4px 10px rgba(255, 183, 197, 0.2);
        }

        .見出し {
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-left: 8px;
            color: #6a5e55;
        }
        .アイコン枠 {
            background: rgba(249, 226, 175, 0.8);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            box-shadow: 0 4px 12px rgba(249, 226, 175, 0.6);
            font-size: 1.2rem;
            animation: ふわふわ 3s infinite ease-in-out alternate;
        }

        @keyframes ふわふわ {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-4px) rotate(5deg); }
        }

        #読み込み中 {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 249, 240, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .動くアイコン {
            font-size: 5rem;
            animation: ぽよんぽよん 0.8s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5);
        }
        @keyframes ぽよんぽよん {
            0% { transform: scale(1.1) translateY(-20px); }
            100% { transform: scale(0.9) translateY(0) scaleY(0.8); }
        }

        details summary { list-style: none; outline: none; }
        details[open] summary .矢印 { transform: rotate(180deg); }
        .矢印 { transition: transform 0.3s; display: inline-block; }

        .集計ボックス {
            padding: 15px 10px;
            border-radius: 24px;
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="pb-24">

    <!-- 超絶おしゃれなオーロラ背景を描画するキャンバス -->
    <canvas id="背景キャンバス"></canvas>

    <div id="読み込み中">
        <div class="動くアイコン" id="icon-loading">🍡</div>
        <p class="font-bold text-gray-500 mt-4 tracking-widest text-sm">魔法をかけてるよ...</p>
    </div>

    <header class="pt-16 pb-8 text-center relative z-10">
        <h1 class="text-3xl font-bold tracking-tighter text-gray-700 drop-shadow-md">ふたりの暮らし家計簿</h1>
        <p class="text-xs text-gray-500 mt-3 tracking-[0.3em] font-bold bg-white/40 inline-block px-4 py-1 rounded-full border border-white/50">しりん ♥ あいき</p>
    </header>

    <main class="px-6 max-w-lg mx-auto space-y-8 relative z-10">
        
        <!-- メニュー画面 -->
        <div id="画面-メニュー" class="grid grid-cols-1 gap-6 animate-in fade-in zoom-in duration-700">
            <button onclick="ページ切替('入力')" class="ガラスのカード p-10 flex items-center gap-6">
                <span class="text-6xl" id="icon-menu-input">✏️</span>
                <div class="text-left">
                    <p class="font-bold text-xl text-gray-700">ノートをかく</p>
                    <p class="text-xs text-gray-500 mt-1 font-medium">あたらしい 記録をつけるよ</p>
                </div>
            </button>
            <button onclick="履歴をよむ()" class="ガラスのカード p-10 flex items-center gap-6">
                <span class="text-6xl" id="icon-menu-history">📋</span>
                <div class="text-left">
                    <p class="font-bold text-xl text-gray-700">履歴をみる</p>
                    <p class="text-xs text-gray-500 mt-1 font-medium">これまでの 歩みをふりかえるよ</p>
                </div>
            </button>
        </div>

        <!-- 入力画面 -->
        <div id="画面-入力" class="hidden space-y-6">
            <div class="flex justify-between items-center px-2">
                <button onclick="ページ切替('メニュー')" class="text-gray-500 font-bold text-sm bg-white/60 px-6 py-3 rounded-full border border-white shadow-sm backdrop-blur-md active:scale-95 transition-all">
                    ← もどる
                </button>
                <button onclick="見本をいれる()" class="text-[10px] px-5 py-3 rounded-full text-blue-500 bg-white/80 font-bold border border-white shadow-sm active:scale-95 transition-all flex items-center gap-1">
                    <span id="icon-example">✨</span> ノートの例をセット
                </button>
            </div>
            
            <form id="家計簿フォーム" class="ガラスのカード p-8 space-y-10">
                <!-- 年月 -->
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[11px] text-gray-500 font-bold ml-3 mb-2 block tracking-widest">とし</label>
                        <input type="number" name="year" id="入力-年" class="入力らん bg-white/40 border-none font-bold text-center text-xl text-gray-600" readonly>
                    </div>
                    <div class="flex-1">
                        <label class="text-[11px] text-gray-500 font-bold ml-3 mb-2 block tracking-widest">つき</label>
                        <select name="month" id="入力-月" class="入力らん font-bold text-center text-xl text-gray-600 appearance-none bg-white/70"></select>
                    </div>
                </div>

                <!-- 収入 -->
                <section>
                    <div class="見出し"><div class="アイコン枠" id="icon-income">💰</div> はいってきた おかね</div>
                    <div class="grid grid-cols-1 gap-5">
                        <div class="relative">
                            <span class="text-[10px] text-gray-500 absolute top-4 left-4 pointer-events-none font-bold">前月ののこり</span>
                            <input type="number" name="prevCarry" class="入力らん 計算対象 pt-8 font-bold text-gray-700" value="0" inputmode="numeric">
                        </div>
                        <div class="relative">
                            <span class="text-[10px] text-gray-500 absolute top-4 left-4 pointer-events-none font-bold">しりんの給料</span>
                            <input type="number" name="incomeS" class="入力らん 計算対象 pt-8 font-bold text-gray-700" value="0" inputmode="numeric">
                        </div>
                        <div class="relative">
                            <span class="text-[10px] text-gray-500 absolute top-4 left-4 pointer-events-none font-bold">あいきの給料</span>
                            <input type="number" name="incomeA" class="入力らん 計算対象 pt-8 font-bold text-gray-700" value="0" inputmode="numeric">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative">
                                <span class="text-[10px] text-gray-500 absolute top-4 left-4 pointer-events-none font-bold">売電</span>
                                <input type="number" name="incomeSolar" class="入力らん 計算対象 pt-8 text-sm font-bold text-gray-700" value="0" inputmode="numeric">
                            </div>
                            <div class="relative">
                                <span class="text-[10px] text-gray-500 absolute top-4 left-4 pointer-events-none font-bold">その他</span>

                            </div>
                        </div>
                    </div>
                </section>

                <!-- 固定支出 -->
                <section>
                    <div class="見出し"><div class="アイコン枠" id="icon-fixed">📉</div> 決まっている支出</div>
                    <div class="grid grid-cols-2 gap-4">
                        <label><span class="text-[11px] text-gray-500 font-bold ml-3">保険(1)</span><input type="number" name="fixIns1" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                        <label><span class="text-[11px] text-gray-500 font-bold ml-3">保険(2)</span><input type="number" name="fixIns2" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                        <label><span class="text-[11px] text-gray-500 font-bold ml-3">ちゅぴcom</span><input type="number" name="fixComm" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                        <label><span class="text-[11px] text-gray-500 font-bold ml-3">投資</span><input type="number" name="fixInvest" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                        <label><span class="text-[11px] text-gray-500 font-bold ml-3">医療</span><input type="number" name="fixMed" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                        <label><span class="text-[11px] text-gray-500 font-bold ml-3">光熱費よさん</span><input type="number" name="fixUtil" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                    </div>
                    <div class="mt-6 p-6 bg-white/40 border-2 border-dashed border-white rounded-[24px] grid grid-cols-2 gap-4">
                        <span class="col-span-2 text-[10px] text-gray-500 font-bold text-center tracking-widest uppercase">光熱費の実績メモ</span>
                        <label><span class="text-[10px] text-gray-500 ml-2 font-bold">水道</span><input type="number" name="utilWater" class="入力らん mt-1 font-bold text-gray-600 bg-white/60" value="0" inputmode="numeric"></label>
                        <label><span class="text-[10px] text-gray-500 ml-2 font-bold">電気</span><input type="number" name="utilElec" class="入力らん mt-1 font-bold text-gray-600 bg-white/60" value="0" inputmode="numeric"></label>
                    </div>
                </section>

                <!-- 生活費 -->
                <section>
                    <div class="見出し"><div class="アイコン枠" id="icon-daily">📅</div> しゅうごとの よさん</div>
                    <div class="space-y-6">
                        <div class="p-6 bg-white/60 border border-white rounded-[32px] shadow-sm">
                            <span class="text-[11px] font-bold text-blue-400 block mb-4 text-center tracking-widest uppercase">やりくり費 (1〜4週目・予備)</span>
                            <div class="grid grid-cols-3 gap-4">
                                <label><span class="text-[9px] block text-center text-gray-500 font-bold mb-1">1週目</span><input type="number" name="day1W" class="入力らん text-center p-3 計算対象 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                                <label><span class="text-[9px] block text-center text-gray-500 font-bold mb-1">2週目</span><input type="number" name="day2W" class="入力らん text-center p-3 計算対象 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                                <label><span class="text-[9px] block text-center text-gray-500 font-bold mb-1">3週目</span><input type="number" name="day3W" class="入力らん text-center p-3 計算対象 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                                <label><span class="text-[9px] block text-center text-gray-500 font-bold mb-1">4週目</span><input type="number" name="day4W" class="入力らん text-center p-3 計算対象 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                                <label class="col-span-2"><span class="text-[9px] block text-center text-gray-500 font-bold mb-1">予備のお金</span><input type="number" name="dayReserve" class="入力らん text-center p-3 計算対象 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <label><span class="text-[11px] text-gray-500 font-bold ml-3">交通費</span><input type="number" name="dayTrans" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                            <label><span class="text-[11px] text-gray-500 font-bold ml-3">特別なひ</span><input type="number" name="daySpecial" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                            <label><span class="text-[11px] text-gray-500 font-bold ml-3">スマホ代</span><input type="number" name="dayComm" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                            <label><span class="text-[11px] text-blue-500 font-bold ml-3">今月の貯金</span><input type="number" name="savings" class="入力らん 計算対象 mt-1 border-blue-200 font-bold text-blue-600 bg-blue-50/50" value="0" inputmode="numeric"></label>
                        </div>
                        <div class="grid grid-cols-2 gap-4 border-t border-white/50 pt-6">
                            <label><span class="text-[11px] text-gray-500 font-bold ml-3">おこづかい(しりん)</span><input type="number" name="dayPocketS" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                            <label><span class="text-[11px] text-gray-500 font-bold ml-3">おこづかい(あいき)</span><input type="number" name="dayPocketA" class="入力らん 計算対象 mt-1 font-bold text-gray-700" value="0" inputmode="numeric"></label>
                        </div>
                    </div>
                </section>

                <!-- 集計サマリー -->
                <div class="flex gap-3 pt-8">
                    <div class="集計ボックス bg-gray-800/90 text-white shadow-xl">
                        <span class="text-[9px] font-bold opacity-70">はいった</span>
                        <span class="text-[13px] font-bold tracking-tight" id="表示-収入">0円</span>
                    </div>
                    <div class="集計ボックス bg-white/70 text-gray-600 border border-white shadow-lg">
                        <span class="text-[9px] font-bold opacity-70">つかった</span>
                        <span class="text-[13px] font-bold tracking-tight" id="表示-支出">0円</span>
                    </div>
                    <div class="集計ボックス bg-blue-400/90 text-white shadow-xl border border-blue-300">
                        <span class="text-[9px] font-bold opacity-90">のこった</span>
                        <span class="text-[13px] font-bold tracking-tight" id="表示-繰越">0円</span>
                    </div>
                </div>

                <button type="button" onclick="保存する()" class="メインボタン w-full text-[19px] mt-4 flex items-center justify-center gap-2">
                    <span id="icon-submit">✨</span> この内容で 保存する
                </button>
            </form>
        </div>

        <!-- 履歴画面 -->
        <div id="画面-履歴" class="hidden space-y-6 animate-in slide-in-from-right duration-500">
            <div class="flex justify-between items-center px-2">
                <button onclick="ページ切替('メニュー')" class="text-gray-500 font-bold text-sm bg-white/60 px-6 py-3 rounded-full border border-white shadow-sm backdrop-blur-md active:scale-95 transition-all">
                    ← もどる
                </button>
                <p class="text-[10px] text-gray-500 font-bold tracking-tighter bg-white/40 px-3 py-1 rounded-full">※最新のデータだけを表示中</p>
            </div>
            <div id="履歴リスト" class="space-y-6 pb-10">
                <!-- 履歴カードがここに入る -->
            </div>
        </div>
    </main>

    <!-- モーダル -->
    <div id="モーダル" class="hidden fixed inset-0 bg-black/30 backdrop-blur-lg flex items-center justify-center z-[9999] p-8">
        <div class="ガラスのカード bg-white/90 p-12 w-full max-w-sm text-center shadow-2xl scale-in-center border-2 border-white">
            <div id="モーダル-アイコン" class="text-7xl mb-6 drop-shadow-md animation-bounce"></div>
            <div id="モーダル-テキスト" class="mb-10 font-bold text-gray-700 leading-relaxed text-lg tracking-tight"></div>
            <button onclick="モーダル閉じる()" class="メインボタン w-full py-5 rounded-3xl text-xl tracking-widest shadow-xl">OK！</button>
        </div>
    </div>

    <script>
        const GASのURL = "https://script.google.com/macros/s/AKfycbyTCsrfKanQ6A6L2DAdeP4GHU6nXyKqF8-eM0tBwgegmYWkD6gxMfFXDacI0-ncVu_s/exec";

        // ★ 毎回かわる「気まぐれアイコン」辞書 ★
        const 気まぐれアイコン = {
            loading: ['🍡', '🍮', '🥞', '🍵', '🍰', '🌸', '✨', '🍀'],
            menuInput: ['✏️', '📝', '🖍️', '🎨', '💌', '✒️'],
            menuHistory: ['📋', '📖', '📚', '🗂️', '🔍', '🧭'],
            income: ['💰', '✨', '💎', '🌈', '🍀', '👑'],
            fixed: ['📉', '💳', '🏡', '🧾', '✂️', '🔌'],
            daily: ['📅', '🗓️', '🎯', '⏳', '🧩', '🛍️'],
            example: ['✨', '💡', '🪄', '🎁', '🎈'],
            submit: ['✨', '🚀', '💌', '📮', '🌈'],
            modalOk: ['⭐', '🌟', '🎉', '🎊', '🌸', '💖'],
            modalErr: ['💦', '💧', '🌧️', '⛈️', '☔', '🥺']
        };

        function アイコンをガチャる() {
            const getIcon = (key) => 気まぐれアイコン[key][Math.floor(Math.random() * 気まぐれアイコン[key].length)];
            document.getElementById('icon-loading').innerText = getIcon('loading');
            document.getElementById('icon-menu-input').innerText = getIcon('menuInput');
            document.getElementById('icon-menu-history').innerText = getIcon('menuHistory');
            document.getElementById('icon-income').innerText = getIcon('income');
            document.getElementById('icon-fixed').innerText = getIcon('fixed');
            document.getElementById('icon-daily').innerText = getIcon('daily');
            document.getElementById('icon-example').innerText = getIcon('example');
            document.getElementById('icon-submit').innerText = getIcon('submit');
        }

        // ★ 世界一おしゃれな「オーロラ背景」生成（Canvas） ★
        function オーロラ背景を描く() {
            const canvas = document.getElementById('背景キャンバス');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            // パステルカラーのオーブ
            const orbs = [
                { x: 0.2, y: 0.2, r: 0.4, color: '#ffb7c5', vx: 0.001, vy: 0.0015 }, // ピンク
                { x: 0.8, y: 0.8, r: 0.5, color: '#87ceeb', vx: -0.0012, vy: -0.001 }, // 水色
                { x: 0.5, y: 0.5, r: 0.6, color: '#f9e2af', vx: 0.0008, vy: -0.0013 }, // 黄色
                { x: 0.8, y: 0.2, r: 0.45, color: '#ffdac1', vx: -0.0015, vy: 0.0008 } // サーモン
            ];

            function draw() {
                ctx.clearRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'lighter'; // 色が重なると光る

                orbs.forEach(orb => {
                    orb.x += orb.vx;
                    orb.y += orb.vy;
                    // 壁でバウンド
                    if (orb.x < 0 || orb.x > 1) orb.vx *= -1;
                    if (orb.y < 0 || orb.y > 1) orb.vy *= -1;

                    const radius = orb.r * Math.min(width, height);
                    const cx = orb.x * width;
                    const cy = orb.y * height;

                    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
                    grad.addColorStop(0, orb.color);
                    grad.addColorStop(1, 'transparent');

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                requestAnimationFrame(draw);
            }
            draw();
        }

        window.onload = () => {
            アイコンをガチャる();
            オーロラ背景を描く();

            document.getElementById('入力-年').value = 2026;
            const 月選択 = document.getElementById('入力-月');
            const 今の月 = new Date().getMonth() + 1;
            for(let i=1; i<=12; i++) {
                const 選 = document.createElement('option');
                選.value = i; 選.textContent = i + "月";
                if(i === 今の月) 選.selected = true;
                月選択.appendChild(選);
            }
            計算の準備();
        };

        function ページ切替(名) {
            アイコンをガチャる(); // 画面を切り替えるたびにアイコンも気分転換
            document.getElementById('画面-メニュー').classList.toggle('hidden', 名 !== 'メニュー');
            document.getElementById('画面-入力').classList.toggle('hidden', 名 !== '入力');
            document.getElementById('画面-履歴').classList.toggle('hidden', 名 !== '履歴');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function 計算の準備() {
            document.querySelectorAll('.計算対象').forEach(el => {
                el.addEventListener('input', 合計計算);
            });
        }

        function 見本をいれる() {
            const フォーム = document.getElementById('家計簿フォーム');
            const 値 = {
                prevCarry: 10000, incomeS: 435000, incomeA: 98000, incomeSolar: 0, incomeOther: 0,
                fixIns1: 15000, fixIns2: 6800, fixComm: 2200, fixInvest: 40000, fixMed: 5000, fixUtil: 15000,
                utilWater: 3496, utilElec: 13638,
                day1W: 40000, day2W: 15000, day3W: 6000, day4W: 15000, dayReserve: 14000,
                dayTrans: 21000, daySpecial: 30000, dayComm: 18000, dayPocketS: 30000, dayPocketA: 30000, savings: 240000
            };
            for (const キー in 値) {
                const el = フォーム.querySelector(`[name="${キー}"]`);
                if (el) el.value = 値[キー];
            }
            合計計算();
            モーダル表示(気まぐれアイコン.modalOk[Math.floor(Math.random() * 気まぐれアイコン.modalOk.length)], "あいきさんのノート例を\nセットしたよ！");
        }

        function 合計計算() {
            const フォームデータ = new FormData(document.getElementById('家計簿フォーム'));
            const 数値 = (名) => parseFloat(フォームデータ.get(名)) || 0;

            const 収入 = 数値('prevCarry') + 数値('incomeS') + 数値('incomeA') + 数値('incomeSolar') + 数値('incomeOther');
            const 生活費内 = 数値('day1W') + 数値('day2W') + 数値('day3W') + 数値('day4W') + 数値('dayReserve');
            const 固定費 = 数値('fixIns1') + 数値('fixIns2') + 数値('fixComm') + 数値('fixInvest') + 数値('fixMed') + 数値('fixUtil');
            const その他 = 数値('dayTrans') + 数値('daySpecial') + 数値('dayComm') + 数値('dayPocketS') + 数値('dayPocketA') + 数値('savings');
            
            const 支出 = 固定費 + 生活費内 + その他;
            const 繰越 = 収入 - 支出;

            document.getElementById('表示-収入').textContent = 収入.toLocaleString() + "円";
            document.getElementById('表示-支出').textContent = 支出.toLocaleString() + "円";
            document.getElementById('表示-繰越').textContent = 繰越.toLocaleString() + "円";

            return { 収入, 支出, 繰越 };
        }

        async function 保存する() {
            const 結果 = 合計計算();
            const フォームデータ = new FormData(document.getElementById('家計簿フォーム'));
            const データ = {
                timestamp: new Date().toLocaleString("ja-JP"),
                resIncome: 結果.収入, resExpense: 結果.支出, resCarry: 結果.繰越
            };
            for(let [キー, 値] of フォームデータ.entries()) データ[キー] = isNaN(値) ? 値 : parseFloat(値);

            読み込み表示(true);
            try {
                const 送信 = await fetch(GASのURL, { method: 'POST', body: JSON.stringify(データ) });
                const 返答 = await 送信.json();
                if(返答.status === 'success') {
                    const icon = 気まぐれアイコン.modalOk[Math.floor(Math.random() * 気まぐれアイコン.modalOk.length)];
                    モーダル表示(icon, "ノートを保存したよ！\n(履歴では最新のみ見えるよ)");
                    document.getElementById('家計簿フォーム').reset();
                    document.getElementById('入力-年').value = 2026;
                    ページ切替('メニュー');
                } else { throw new Error(返答.message); }
            } catch(e) {
                const errIcon = 気まぐれアイコン.modalErr[Math.floor(Math.random() * 気まぐれアイコン.modalErr.length)];
                モーダル表示(errIcon, "しっぱい...\nもう一度やってみてね");
            } finally {
                読み込み表示(false);
            }
        }

        async function 履歴をよむ() {
            読み込み表示(true);
            try {
                const 取得 = await fetch(GASのURL);
                const 返答 = await 取得.json();
                if(返答.status === 'success') {
                    履歴を表示(返答.data);
                    ページ切替('履歴');
                } else { throw new Error(返答.message); }
            } catch(e) {
                const errIcon = 気まぐれアイコン.modalErr[Math.floor(Math.random() * 気まぐれアイコン.modalErr.length)];
                モーダル表示(errIcon, "データが とれなかったよ");
            } finally {
                読み込み表示(false);
            }
        }

        function 履歴を表示(データ) {
            const リスト = document.getElementById('履歴リスト');
            リスト.innerHTML = "";
            if (!データ || データ.length === 0) {
                リスト.innerHTML = "<div class='ガラスのカード p-10 text-center text-gray-500 font-bold'>まだ 記録がないよ🌱</div>";
                return;
            }

            // 同一月は「最新」のみ抽出
            const 最新マップ = new Map();
            データ.forEach(行 => {
                const キー = `${行.year}-${行.month}`;
                最新マップ.set(キー, 行);
            });

            const 表示データ = Array.from(最新マップ.values()).reverse();
            
            表示データ.forEach(行 => {
                const カード = document.createElement('div');
                カード.className = "ガラスのカード overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500 mb-6";
                カード.innerHTML = `
                    <div class="px-8 py-6 flex justify-between items-baseline border-b border-white/50 bg-white/30">
                        <span class="font-bold text-gray-700 text-2xl">${行.year}年 ${行.month}月</span>
                        <span class="text-[9px] text-gray-500 font-bold tracking-tighter italic bg-white/50 px-2 py-1 rounded-full">${行.timestamp}</span>
                    </div>

                    <div class="px-8 py-8 flex gap-3">
                        <div class="集計ボックス bg-white/60 shadow-inner">
                            <span class="text-[9px] text-gray-500 font-bold uppercase">はいった</span>
                            <span class="text-[13px] font-bold text-gray-700">¥${(行.resIncome||0).toLocaleString()}</span>
                        </div>
                        <div class="集計ボックス bg-white/60 shadow-inner">
                            <span class="text-[9px] text-gray-500 font-bold uppercase">つかった</span>
                            <span class="text-[13px] font-bold text-gray-700">¥${(行.resExpense||0).toLocaleString()}</span>
                        </div>
                        <div class="集計ボックス bg-blue-400 text-white shadow-lg border border-blue-300">
                            <span class="text-[9px] opacity-90 font-bold uppercase">のこった</span>
                            <span class="text-[13px] font-bold">¥${(行.resCarry||0).toLocaleString()}</span>
                        </div>
                    </div>

                    <details class="group">
                        <summary class="text-center text-[10px] text-gray-600 font-bold cursor-pointer py-5 border-t border-white/50 bg-white/40 hover:bg-white/60 transition-colors flex items-center justify-center gap-2 tracking-widest uppercase">
                            詳細をひらく <span class="矢印 text-blue-400 text-sm">▼</span>
                        </summary>
                        <div class="px-8 pb-10 pt-6 space-y-8 text-[12px] text-gray-700 bg-white/30">
                            <div class="space-y-2">
                                <p class="text-[11px] font-bold text-blue-400 border-b border-blue-200 pb-1 mb-3">💰 収入の内訳</p>
                                <div class="flex justify-between"><span>前月より:</span><span class="font-bold text-gray-800">¥${(行.prevCarry||0).toLocaleString()}</span></div>
                                <div class="flex justify-between"><span>しりん:</span><span class="font-bold text-gray-800">¥${(行.incomeS||0).toLocaleString()}</span></div>
                                <div class="flex justify-between"><span>あいき:</span><span class="font-bold text-gray-800">¥${(行.incomeA||0).toLocaleString()}</span></div>
                                <div class="flex justify-between"><span>売電/他:</span><span class="font-bold text-gray-800">¥${((行.incomeSolar||0)+(行.incomeOther||0)).toLocaleString()}</span></div>
                            </div>
                            <div class="space-y-2">
                                <p class="text-[11px] font-bold text-blue-400 border-b border-blue-200 pb-1 mb-3">📉 固定の支出</p>
                                <div class="flex justify-between"><span>保険:</span><span class="font-bold text-gray-800">¥${((行.fixIns1||0)+(行.fixIns2||0)).toLocaleString()}</span></div>
                                <div class="flex justify-between text-blue-600 font-bold"><span>ちゅぴcom:</span><span>¥${(行.fixComm||0).toLocaleString()}</span></div>
                                <div class="flex justify-between"><span>投資:</span><span class="font-bold text-gray-800">¥${(行.fixInvest||0).toLocaleString()}</span></div>
                                <div class="flex justify-between text-[11px]"><span>光熱費予算:</span><span class="font-bold text-gray-800">¥${(行.fixUtil||0).toLocaleString()}</span></div>
                                <div class="flex justify-between text-[10px] text-gray-500 bg-white/50 p-2 rounded-lg mt-2 border border-white"><span>実績(水/電):</span><span class="font-bold text-gray-600">¥${(行.utilWater||0).toLocaleString()} / ¥${(行.utilElec||0).toLocaleString()}</span></div>
                            </div>
                            <div class="space-y-2">
                                <p class="text-[11px] font-bold text-blue-400 border-b border-blue-200 pb-1 mb-3">📅 しゅうごとの予算</p>
                                <div class="grid grid-cols-2 gap-x-6 gap-y-2">
                                    <div class="flex justify-between"><span>1週目:</span><span class="font-bold text-gray-800">¥${(行.day1W||0).toLocaleString()}</span></div>
                                    <div class="flex justify-between"><span>2週目:</span><span class="font-bold text-gray-800">¥${(行.day2W||0).toLocaleString()}</span></div>
                                    <div class="flex justify-between"><span>3週目:</span><span class="font-bold text-gray-800">¥${(行.day3W||0).toLocaleString()}</span></div>
                                    <div class="flex justify-between"><span>4週目:</span><span class="font-bold text-gray-800">¥${(行.day4W||0).toLocaleString()}</span></div>
                                    <div class="flex justify-between col-span-2 pt-2 border-t border-white/50 mt-1"><span>予備のお金:</span><span class="font-bold text-gray-800">¥${(行.dayReserve||0).toLocaleString()}</span></div>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <p class="text-[11px] font-bold text-blue-400 border-b border-blue-200 pb-1 mb-3">✨ その他・貯金</p>
                                <div class="flex justify-between"><span>交通/特別/通信:</span><span class="font-bold text-gray-800">¥${((行.dayTrans||0)+(行.daySpecial||0)+(行.dayComm||0)).toLocaleString()}</span></div>
                                <div class="flex justify-between"><span>お小遣い(しりん):</span><span class="font-bold text-gray-800">¥${(行.dayPocketS||0).toLocaleString()}</span></div>
                                <div class="flex justify-between"><span>お小遣い(あいき):</span><span class="font-bold text-gray-800">¥${(行.dayPocketA||0).toLocaleString()}</span></div>
                                <div class="flex justify-between font-bold text-blue-600 bg-blue-50/70 p-4 rounded-2xl mt-5 border-2 border-blue-100 shadow-sm items-center">
                                    <span class="text-[11px]">今月の純貯金:</span>
                                    <span class="text-[15px]">¥${(行.savings||0).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </details>
                `;
                リスト.appendChild(カード);
            });
        }

        function 読み込み表示(フラグ) {
            document.getElementById('読み込み中').style.display = フラグ ? 'flex' : 'none';
        }
        function モーダル表示(アイコン, テキスト) {
            document.getElementById('モーダル-アイコン').textContent = アイコン;
            document.getElementById('モーダル-テキスト').innerText = テキスト;
            document.getElementById('モーダル').classList.remove('hidden');
        }
        function モーダル閉じる() {
            document.getElementById('モーダル').classList.add('hidden');
        }
    </script>
</body>
</html>
