<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ふたりの暮らし家計簿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-bg: #fff9fa;
            --pink-accent: #ffb7c5;
            --pink-deep: #ff85a2;
            --text-color: #5d574f;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--pink-bg);
            color: var(--text-color);
            background-image: radial-gradient(#ffb7c5 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .kawaii-font { font-family: 'Kiwi Maru', serif; }
        
        .app-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px -4px rgba(255, 133, 162, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        input {
            background: #fdfdfd;
            border-radius: 0.5rem;
            border: 1px solid #eee;
            padding: 8px;
            font-size: 16px; 
            outline: none;
            width: 100%;
            text-align: right;
        }
        input:focus {
            border-color: var(--pink-accent);
            background: white;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(env(safe-area-inset-bottom) + 10px);
            border-top: 1px solid var(--pink-accent);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #aaa;
            font-size: 10px;
            font-weight: bold;
        }
        .nav-item.active {
            color: var(--pink-deep);
        }

        .hidden { display: none !important; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <div id="screen-menu" class="p-6 max-w-md mx-auto fade-in">
        <div class="py-12 text-center">
            <div class="text-6xl mb-4 animate-bounce">🏠💕</div>
            <h1 class="kawaii-font text-3xl font-bold text-pink-500">ふたりの家計簿</h1>
            <p class="text-xs text-pink-300 font-bold mt-2">未来をふたりで作る記録帳</p>
        </div>

        <div class="grid gap-4 mt-8">
            <button onclick="switchScreen('input')" class="app-card p-6 flex items-center justify-between active:scale-95 transition group bg-white">
                <div class="flex items-center gap-4">
                    <span class="text-3xl">✏️</span>
                    <div class="text-left">
                        <div class="font-bold text-lg text-slate-700">家計簿をつける</div>
                        <div class="text-[10px] text-pink-400">毎日の記録を保存します</div>
                    </div>
                </div>
                <span class="text-pink-300">▶</span>
            </button>

            <button onclick="switchScreen('view')" class="app-card p-6 flex items-center justify-between active:scale-95 transition group bg-white">
                <div class="flex items-center gap-4">
                    <span class="text-3xl">📖</span>
                    <div class="text-left">
                        <div class="font-bold text-lg text-slate-700">これまでの記録</div>
                        <div class="text-[10px] text-pink-400">過去のデータを見てみるよ</div>
                    </div>
                </div>
                <span class="text-pink-300">▶</span>
            </button>
        </div>
    </div>

    <div id="screen-input" class="hidden p-4 max-w-md mx-auto fade-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="kawaii-font text-xl font-bold text-pink-500">家計簿をつける</h2>
            <div class="flex items-center gap-1 bg-white px-3 py-1 rounded-full shadow-sm">
                <input type="number" id="year" value="2026" class="w-14 text-center text-xs border-none bg-transparent">
                <span class="text-[10px] text-pink-300">年</span>
                <input type="number" id="month" value="1" class="w-8 text-center text-sm font-bold border-none bg-transparent text-pink-500">
                <span class="text-[10px] text-pink-300">月</span>
            </div>
        </div>

        <div class="space-y-6">
            <div class="app-card p-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-pink-400 text-white text-[10px] px-3 py-1 rounded-full font-bold tracking-widest">しゅうにゅう</span>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-500">前の月ののこり</span>
                        <input type="number" id="prevCarry" onchange="calc()" value="10000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <span class="text-[10px] text-slate-400 block ml-1">お給料：Ｓ</span>
                            <input type="number" id="incomeS" onchange="calc()" value="435000" inputmode="numeric">
                        </div>
                        <div class="space-y-1">
                            <span class="text-[10px] text-slate-400 block ml-1">お給料：Ａ</span>
                            <input type="number" id="incomeA" onchange="calc()" value="98000" inputmode="numeric">
                        </div>
                        <div class="space-y-1">
                            <span class="text-[10px] text-slate-400 block ml-1">売電</span>
                            <input type="number" id="incomeSolar" onchange="calc()" value="0" inputmode="numeric">
                        </div>
                        <div class="space-y-1">
                            <span class="text-[10px] text-slate-400 block ml-1">その他</span>
                            <input type="number" id="incomeOther" onchange="calc()" value="0" inputmode="numeric">
                        </div>
                    </div>
                </div>
            </div>

            <div class="app-card p-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-blue-400 text-white text-[10px] px-3 py-1 rounded-full font-bold tracking-widest">決まったしはらい</span>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs">保険(1)</span>
                        <input type="number" id="fixIns1" onchange="calc()" value="15000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs">保険(2)</span>
                        <input type="number" id="fixIns2" onchange="calc()" value="6800" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-pink-500">ちゅピコム</span>
                        <input type="number" id="fixComm" onchange="calc()" value="2200" inputmode="numeric" class="w-32 font-bold text-pink-500">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs">投資</span>
                        <input type="number" id="fixInvest" onchange="calc()" value="40000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs">医療</span>
                        <input type="number" id="fixMed" onchange="calc()" value="5000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-blue-500">光熱費(予算)</span>
                        <input type="number" id="fixUtil" onchange="calc()" value="15000" inputmode="numeric" class="w-32 font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2 bg-slate-50 p-2 rounded-xl">
                        <div class="flex items-center gap-1">
                            <span class="text-[9px] text-slate-400">水道:</span>
                            <input type="number" id="utilWater" onchange="calc()" value="3496" inputmode="numeric" class="text-[10px] p-1">
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-[9px] text-slate-400">電気:</span>
                            <input type="number" id="utilElec" onchange="calc()" value="13638" inputmode="numeric" class="text-[10px] p-1">
                        </div>
                    </div>
                    <div class="text-right text-[10px] font-bold text-slate-400">
                        光熱費じっせき: ¥ <span id="actualUtilSum">0</span>
                    </div>
                </div>
            </div>

            <div class="app-card p-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-emerald-400 text-white text-[10px] px-3 py-1 rounded-full font-bold tracking-widest">せいかつひ</span>
                </div>
                <div class="grid gap-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs">やりくり費</span>
                        <input type="number" id="dayLiving" onchange="calc()" value="90000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs">交通費</span>
                        <input type="number" id="dayTrans" onchange="calc()" value="21000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs">特別費</span>
                        <input type="number" id="daySpecial" onchange="calc()" value="30000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-500">通信</span>
                        <input type="number" id="dayComm" onchange="calc()" value="18000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-500">おこづかい</span>
                        <input type="number" id="dayPocket" onchange="calc()" value="30000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-500">予備費</span>
                        <input type="number" id="dayOther" onchange="calc()" value="30000" inputmode="numeric" class="w-32">
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-100 pt-3">
                        <span class="text-xs font-bold text-emerald-600">貯金</span>
                        <input type="number" id="savings" onchange="calc()" value="240000" inputmode="numeric" class="w-32 font-bold text-emerald-600">
                    </div>
                </div>
            </div>

            <div class="app-card p-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-purple-400 text-white text-[10px] px-3 py-1 rounded-full font-bold tracking-widest">しゅうよさん</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="text-center p-2 bg-purple-50 rounded-xl">
                        <span class="text-[8px] font-bold text-purple-400">1週め</span>
                        <input type="number" id="w1" value="40000" inputmode="numeric" class="text-center text-xs p-0 border-none bg-transparent">
                    </div>
                    <div class="text-center p-2 bg-purple-50 rounded-xl">
                        <span class="text-[8px] font-bold text-purple-400">2週め</span>
                        <input type="number" id="w2" value="15000" inputmode="numeric" class="text-center text-xs p-0 border-none bg-transparent">
                    </div>
                    <div class="text-center p-2 bg-purple-50 rounded-xl">
                        <span class="text-[8px] font-bold text-purple-400">3週め</span>
                        <input type="number" id="w3" value="6000" inputmode="numeric" class="text-center text-xs p-0 border-none bg-transparent">
                    </div>
                    <div class="text-center p-2 bg-purple-50 rounded-xl">
                        <span class="text-[8px] font-bold text-purple-400">4週め</span>
                        <input type="number" id="w4" value="15000" inputmode="numeric" class="text-center text-xs p-0 border-none bg-transparent">
                    </div>
                    <div class="text-center p-2 bg-slate-100 rounded-xl col-span-2">
                        <span class="text-[8px] font-bold text-slate-400">予備費</span>
                        <input type="number" id="wRes" value="14000" inputmode="numeric" class="text-center text-xs p-0 border-none bg-transparent">
                    </div>
                </div>
            </div>

            <div class="app-card p-6 bg-gradient-to-br from-pink-500 to-rose-400 text-white shadow-lg">
                <div class="space-y-3">
                    <div class="flex justify-between items-center opacity-80 text-xs">
                        <span>しゅうにゅう（繰越込）</span>
                        <span class="font-mono font-bold">¥ <span id="resIncome">0</span></span>
                    </div>
                    <div class="flex justify-between items-center opacity-80 text-xs">
                        <span>ししゅつ（合計）</span>
                        <span class="font-mono font-bold">¥ <span id="resExpense">0</span></span>
                    </div>
                    <div class="pt-3 border-t border-white/30 flex justify-between items-center">
                        <span class="font-black text-sm">つぎの月へのこす分</span>
                        <span class="text-2xl font-black font-mono">¥ <span id="resCarry">0</span></span>
                    </div>
                </div>
            </div>

            <button id="btnSubmit" onclick="submitToSheets()" class="w-full py-5 bg-pink-500 text-white rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-all">
                保存する ✨
            </button>
            <div id="statusMsg" class="text-center text-sm font-bold opacity-0 transition-opacity pb-10 mt-2"></div>
        </div>
    </div>

    <div id="screen-view" class="hidden p-4 max-w-md mx-auto fade-in">
        <h2 class="kawaii-font text-2xl font-bold text-pink-500 mb-6 text-center">これまでの記録</h2>
        <div id="history-container" class="space-y-4">
            </div>
    </div>

    <nav class="bottom-nav no-print">
        <button onclick="switchScreen('menu')" id="nav-menu" class="nav-item active">
            <span class="text-xl">🏠</span>
            <span>メニュー</span>
        </button>
        <button onclick="switchScreen('input')" id="nav-input" class="nav-item">
            <span class="text-xl">✏️</span>
            <span>つける</span>
        </button>
        <button onclick="switchScreen('view')" id="nav-view" class="nav-item">
            <span class="text-xl">📖</span>
            <span>みる</span>
        </button>
    </nav>

    <script>
        // 【最新のURL】
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbwPIsHlIpSg5GruxysF8FIjromO0gCyrKmcjt5g5UtAmQlQa0C-MMolAZ8U4VY3vgqg/exec";

        function switchScreen(screen) {
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-input').classList.add('hidden');
            document.getElementById('screen-view').classList.add('hidden');
            document.getElementById(`screen-${screen}`).classList.remove('hidden');

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${screen}`).classList.add('active');

            if(screen === 'view') fetchFromSheets();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function getVal(id) {
            const el = document.getElementById(id);
            return el ? (Number(el.value) || 0) : 0;
        }

        function calc() {
            const carry = getVal('prevCarry');
            const s = getVal('incomeS');
            const a = getVal('incomeA');
            const solar = getVal('incomeSolar');
            const otherI = getVal('incomeOther');
            const displayIncomeTotal = carry + s + a + solar + otherI;

            const totalFixed = getVal('fixIns1') + getVal('fixIns2') + getVal('fixComm') + 
                               getVal('fixInvest') + getVal('fixMed') + getVal('fixUtil');

            const totalDaily = getVal('dayLiving') + getVal('dayTrans') + getVal('daySpecial') + 
                               getVal('dayComm') + getVal('dayPocket') + getVal('dayOther');

            const savings = getVal('savings');
            const totalExpense = totalFixed + totalDaily + savings;
            const finalCarry = displayIncomeTotal - totalExpense;
            const utilSum = getVal('utilWater') + getVal('utilElec');

            const resIncomeEl = document.getElementById('resIncome');
            const resExpenseEl = document.getElementById('resExpense');
            const resCarryEl = document.getElementById('resCarry');
            const actualUtilSumEl = document.getElementById('actualUtilSum');
            
            if (resIncomeEl) resIncomeEl.innerText = displayIncomeTotal.toLocaleString();
            if (resExpenseEl) resExpenseEl.innerText = totalExpense.toLocaleString();
            if (resCarryEl) resCarryEl.innerText = finalCarry.toLocaleString();
            if (actualUtilSumEl) actualUtilSumEl.innerText = utilSum.toLocaleString();
        }

        async function submitToSheets() {
            const btn = document.getElementById('btnSubmit');
            const status = document.getElementById('statusMsg');
            const payload = {
                year: document.getElementById('year').value,
                month: document.getElementById('month').value,
                carry: document.getElementById('prevCarry').value,
                income: document.getElementById('resIncome').innerText.replace(/,/g, ''),
                expense: document.getElementById('resExpense').innerText.replace(/,/g, ''),
                finalCarry: document.getElementById('resCarry').innerText.replace(/,/g, ''),
                savings: document.getElementById('savings').value
            };

            btn.disabled = true;
            btn.innerText = "送信中...";

            try {
                // セキュリティブロックを回避する最強設定
                await fetch(DEFAULT_GAS_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', // ブラウザのブロックを無視して送信
                    headers: {
                        'Content-Type': 'text/plain' // 単純なテキストとして送る
                    },
                    body: JSON.stringify(payload) 
                });
                
                status.innerText = "保存できたよ！✨";
                status.style.opacity = "1";
                status.style.color = "#ff85a2";
            } catch (e) {
                status.innerText = "エラーが起きたかも... 😢";
                status.style.opacity = "1";
                status.style.color = "#f43f5e";
            } finally {
                btn.disabled = false;
                btn.innerText = "保存する ✨";
                setTimeout(() => status.style.opacity = "0", 4000);
            }
        }

        async function fetchFromSheets() {
            const container = document.getElementById('history-container');
            container.innerHTML = '<div class="text-center py-10 text-pink-300 italic">よみこみ中... 🕊️</div>';
            
            try {
                const response = await fetch(DEFAULT_GAS_URL);
                const data = await response.json();
                
                if(!data || data.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-slate-300">まだ記録がないよ</div>';
                    return;
                }

                container.innerHTML = data.reverse().map(row => `
                    <div class="app-card p-5 border-l-8 border-pink-400 fade-in">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-black text-xl text-pink-500 kawaii-font">${row.year}年 ${row.month}月</span>
                            <span class="text-[8px] text-slate-300">${row.timestamp ? new Date(row.timestamp).toLocaleDateString() : ''}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-[10px] text-center">
                            <div class="bg-slate-50 p-2 rounded-xl">
                                <div class="text-slate-400 mb-1 tracking-tighter">しゅうにゅう</div>
                                <div class="font-bold">¥${Number(row.income).toLocaleString()}</div>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-xl">
                                <div class="text-slate-400 mb-1 tracking-tighter">ししゅつ</div>
                                <div class="font-bold">¥${Number(row.expense).toLocaleString()}</div>
                            </div>
                            <div class="bg-pink-50 p-2 rounded-xl">
                                <div class="text-pink-400 mb-1 font-bold tracking-tighter">のこり</div>
                                <div class="font-bold text-pink-600">¥${Number(row.finalCarry).toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div class="text-center py-10 text-rose-300 italic">よみこみエラー<br>もうすこし待ってから試してね</div>';
            }
        }

        window.onload = calc;
    </script>
</body>
</html>
